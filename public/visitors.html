<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>访客记录 - Zoe's Blog</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        h1 {
            color: white;
            font-size: 2rem;
        }

        .back-btn {
            padding: 10px 20px;
            background: white;
            color: #667eea;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
        }

        .login-box {
            background: white;
            border-radius: 20px;
            padding: 50px;
            max-width: 500px;
            margin: 100px auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .login-box h2 {
            color: #333;
            margin-bottom: 30px;
            font-size: 1.8rem;
        }

        .login-input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1.1rem;
            margin-bottom: 20px;
            transition: border-color 0.3s ease;
        }

        .login-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .error {
            color: #ff6b6b;
            margin-top: 15px;
            font-size: 0.95rem;
            display: none;
        }

        .logs-container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .logs-header {
            display: grid;
            grid-template-columns: 1fr 2fr 2fr;
            padding: 15px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 10px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .log-item {
            display: grid;
            grid-template-columns: 1fr 2fr 2fr;
            padding: 15px 20px;
            border-bottom: 1px solid #e0e0e0;
            align-items: center;
        }

        .log-item:last-child {
            border-bottom: none;
        }

        .log-item:hover {
            background: #f8f9fa;
        }

        .no-logs {
            text-align: center;
            color: #666;
            padding: 40px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            color: #666;
            margin-top: 5px;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .shake {
            animation: shake 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="loginSection" style="display: none;">
            <div class="login-box">
                <h2>管理员登录</h2>
                <input type="password" class="login-input" id="adminKey" placeholder="请输入管理员密钥">
                <button class="login-btn" onclick="verifyAdmin()">登录</button>
                <p class="error" id="error-msg">密钥错误，请重新输入</p>
            </div>
        </div>

        <div id="logsSection" style="display: none;">
            <div class="header">
                <h1>访客记录</h1>
                <a href="/index.html" class="back-btn">返回博客</a>
            </div>

            <div class="stats">
                <div class="stat-card">
                    <div class="stat-number" id="totalVisits">0</div>
                    <div class="stat-label">总访问次数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="todayVisits">0</div>
                    <div class="stat-label">今日访问</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="uniqueIPs">0</div>
                    <div class="stat-label">独立IP数</div>
                </div>
            </div>

            <div class="logs-container">
                <div class="logs-header">
                    <div>序号</div>
                    <div>IP地址</div>
                    <div>访问时间</div>
                </div>
                <div id="logsList"></div>
            </div>
        </div>
    </div>

    <script>
        let adminKey = '';

        async function verifyAdmin() {
            const key = document.getElementById('adminKey').value.trim();
            const errorMsg = document.getElementById('error-msg');
            const loginBox = document.querySelector('.login-box');

            if (!key) {
                errorMsg.textContent = '请输入密钥';
                errorMsg.style.display = 'block';
                return;
            }

            try {
                const response = await fetch('/api/access-logs', {
                    headers: { 'x-admin-key': key }
                });

                if (response.status === 403) {
                    errorMsg.textContent = '密钥错误，请重新输入';
                    errorMsg.style.display = 'block';
                    loginBox.classList.add('shake');
                    setTimeout(() => loginBox.classList.remove('shake'), 300);
                    return;
                }

                if (response.ok) {
                    adminKey = key;
                    document.getElementById('loginSection').style.display = 'none';
                    document.getElementById('logsSection').style.display = 'block';
                    loadLogs();
                }
            } catch (error) {
                errorMsg.textContent = '验证失败，请重试';
                errorMsg.style.display = 'block';
            }
        }

        async function loadLogs() {
            try {
                const response = await fetch('/api/access-logs', {
                    headers: { 'x-admin-key': adminKey }
                });
                const logs = await response.json();

                const today = new Date().toDateString();
                const todayLogs = logs.filter(log => new Date(log.accessed_at).toDateString() === today);
                const uniqueIPs = new Set(logs.map(log => log.ip_address));

                document.getElementById('totalVisits').textContent = logs.length;
                document.getElementById('todayVisits').textContent = todayLogs.length;
                document.getElementById('uniqueIPs').textContent = uniqueIPs.size;

                const logsList = document.getElementById('logsList');
                if (logs.length === 0) {
                    logsList.innerHTML = '<div class="no-logs">暂无访客记录</div>';
                    return;
                }

                logsList.innerHTML = logs.map((log, index) => `
                    <div class="log-item">
                        <div>${index + 1}</div>
                        <div>${log.ip_address}</div>
                        <div>${new Date(log.accessed_at).toLocaleString('zh-CN')}</div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading logs:', error);
            }
        }

        document.getElementById('adminKey').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                verifyAdmin();
            }
        });

        window.onload = () => {
            document.getElementById('loginSection').style.display = 'block';
        };
    </script>
</body>
</html>
