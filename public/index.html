<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoe's Blog</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 40px 0;
            color: white;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid white;
            padding: 12px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .nav-btn:hover {
            background: white;
            color: #667eea;
        }

        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .post-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }

        .post-card:hover {
            transform: translateY(-5px);
        }

        .post-card h3 {
            color: #333;
            margin-bottom: 10px;
            font-size: 1.4rem;
        }

        .post-card .date {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }

        .post-card .preview {
            color: #555;
            line-height: 1.6;
            margin-bottom: 15px;
            max-height: 100px;
            overflow: hidden;
        }

        .post-card .images-preview {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .post-card .images-preview img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
        }

        .post-actions {
            display: flex;
            gap: 10px;
        }

        .post-actions button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .btn-edit {
            background: #667eea;
            color: white;
        }

        .btn-edit:hover {
            background: #5a6fd6;
        }

        .btn-delete {
            background: #ff6b6b;
            color: white;
        }

        .btn-delete:hover {
            background: #ee5a5a;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            overflow-y: auto;
            padding: 20px;
        }

        .modal.active {
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 800px;
            width: 100%;
            margin: 40px auto;
        }

        .modal-content h2 {
            margin-bottom: 30px;
            color: #333;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }

        .form-group input[type="text"],
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        .form-group input[type="text"]:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group textarea {
            min-height: 200px;
            resize: vertical;
            font-family: inherit;
        }

        .image-upload-area {
            border: 2px dashed #ccc;
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .image-upload-area:hover {
            border-color: #667eea;
            background: #f8f8ff;
        }

        .image-upload-area input[type="file"] {
            display: none;
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .preview-images {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .preview-item {
            position: relative;
            width: 120px;
            height: 120px;
        }

        .preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;
            border: 2px solid #e0e0e0;
        }

        .preview-item .remove-btn {
            position: absolute;
            top: -10px;
            right: -10px;
            width: 25px;
            height: 25px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-actions {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .modal-actions button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-cancel {
            background: #e0e0e0;
            color: #555;
        }

        .btn-cancel:hover {
            background: #d0d0d0;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: white;
        }

        .empty-state .icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .empty-state h3 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: white;
        }

        @media (max-width: 768px) {
            .posts-grid {
                grid-template-columns: 1fr;
            }

            .modal-content {
                padding: 25px;
                margin: 20px auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Zoe's Blog</h1>
            <p>记录生活，分享美好</p>
            <div class="nav">
                <button class="nav-btn" onclick="openEditor()">撰写新日志</button>
                <button class="nav-btn" onclick="loadPosts()">刷新列表</button>
            </div>
        </header>

        <div id="posts-container">
            <div class="loading">加载中...</div>
        </div>
    </div>

    <div class="modal" id="editor-modal">
        <div class="modal-content">
            <h2 id="editor-title">撰写新日志</h2>
            <form id="post-form">
                <input type="hidden" id="post-id">

                <div class="form-group">
                    <label for="post-title">标题</label>
                    <input type="text" id="post-title" placeholder="请输入日志标题" required>
                </div>

                <div class="form-group">
                    <label for="post-content">内容</label>
                    <textarea id="post-content" placeholder="请输入日志内容" required></textarea>
                </div>

                <div class="form-group">
                    <label>图片上传</label>
                    <div class="image-upload-area" onclick="document.getElementById('image-input').click()" ondragover="event.preventDefault()" ondrop="handleDrop(event)">
                        <div class="upload-icon">📷</div>
                        <p>点击或拖拽图片到此处上传</p>
                        <p style="font-size: 0.85rem; color: #888; margin-top: 5px;">支持 JPG、PNG、GIF、WebP 格式，最多10张，单张最大50MB</p>
                        <input type="file" id="image-input" multiple accept="image/*" onchange="handleImageSelect(event)">
                    </div>
                    <div class="preview-images" id="preview-container"></div>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn-cancel" onclick="closeEditor()">取消</button>
                    <button type="submit" class="btn-submit" id="submit-btn">发布</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal" id="view-modal">
        <div class="modal-content">
            <h2 id="view-title"></h2>
            <p id="view-date" style="color: #888; margin-bottom: 20px;"></p>
            <div id="view-images" class="images-preview" style="margin-bottom: 20px;"></div>
            <div id="view-content" style="line-height: 1.8; color: #333; margin-bottom: 30px;"></div>
            
            <div class="comments-section">
                <h3 style="margin-bottom: 15px; color: #333;">评论</h3>
                <div id="comments-list" style="margin-bottom: 20px;"></div>
                <div class="comment-form">
                    <input type="text" id="comment-author" placeholder="你的名字" style="width: 30%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 8px; margin-right: 10px;">
                    <input type="text" id="comment-content" placeholder="写下你的评论..." style="width: 50%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 8px; margin-right: 10px;">
                    <button onclick="submitComment()" style="padding: 10px 20px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer;">发送</button>
                </div>
            </div>
            
            <div class="modal-actions" style="margin-top: 30px;">
                <button class="btn-cancel" onclick="closeViewer()">关闭</button>
            </div>
        </div>
    </div>

    <script>
        let selectedFiles = [];
        let editingPostId = null;
        let currentViewPostId = null;

        async function loadPosts() {
            const container = document.getElementById('posts-container');
            container.innerHTML = '<div class="loading">加载中...</div>';

            try {
                const response = await fetch('/api/posts');
                const posts = await response.json();

                if (posts.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="icon">📝</div>
                            <h3>还没有日志</h3>
                            <p>点击"撰写新日志"开始创作吧！</p>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = '<div class="posts-grid">' + posts.map(post => `
                    <div class="post-card">
                        <h3>${escapeHtml(post.title)}</h3>
                        <p class="date">${new Date(post.created_at).toLocaleString('zh-CN')}</p>
                        <p class="preview">${escapeHtml(post.content.substring(0, 100))}...</p>
                        ${post.images && post.images.length > 0 ? `
                            <div class="images-preview">
                                ${post.images.slice(0, 4).map(img => `<img src="${img}" alt="preview">`).join('')}
                                ${post.images.length > 4 ? `<span>+${post.images.length - 4}</span>` : ''}
                            </div>
                        ` : ''}
                        <div class="post-actions">
                            <button class="btn-edit" onclick="viewPost(${post.id})">查看</button>
                            <button class="btn-edit" onclick="editPost(${post.id})">编辑</button>
                            <button class="btn-delete" onclick="deletePost(${post.id})">删除</button>
                        </div>
                    </div>
                `).join('') + '</div>';

            } catch (error) {
                container.innerHTML = '<div class="loading">加载失败，请刷新重试</div>';
                console.error('Error loading posts:', error);
            }
        }

        function openEditor(postId = null) {
            editingPostId = postId;
            const modal = document.getElementById('editor-modal');
            const title = document.getElementById('editor-title');
            const submitBtn = document.getElementById('submit-btn');

            if (postId) {
                title.textContent = '编辑日志';
                submitBtn.textContent = '保存修改';
                loadPostForEdit(postId);
            } else {
                title.textContent = '撰写新日志';
                submitBtn.textContent = '发布';
                document.getElementById('post-form').reset();
                document.getElementById('post-id').value = '';
                selectedFiles = [];
                document.getElementById('preview-container').innerHTML = '';
            }

            modal.classList.add('active');
        }

        async function loadPostForEdit(postId) {
            try {
                const response = await fetch(`/api/posts/${postId}`);
                const post = await response.json();

                document.getElementById('post-id').value = post.id;
                document.getElementById('post-title').value = post.title;
                document.getElementById('post-content').value = post.content;

                selectedFiles = [];
                const previewContainer = document.getElementById('preview-container');
                previewContainer.innerHTML = '';

                if (post.images && post.images.length > 0) {
                    post.images.forEach((img, index) => {
                        addPreviewImage(img, true);
                    });
                }

            } catch (error) {
                alert('加载日志失败');
                console.error('Error loading post:', error);
            }
        }

        function closeEditor() {
            document.getElementById('editor-modal').classList.remove('active');
            editingPostId = null;
            selectedFiles = [];
            document.getElementById('preview-container').innerHTML = '';
        }

        function handleDrop(event) {
            event.preventDefault();
            const files = Array.from(event.dataTransfer.files);
            handleImageFiles(files);
        }

        function handleImageSelect(event) {
            const files = Array.from(event.target.files);
            handleImageFiles(files);
            event.target.value = '';
        }

        function compressImage(file) {
            return new Promise((resolve) => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const img = new Image();

                img.onload = () => {
                    let width = img.width;
                    let height = img.height;
                    const maxWidth = 2000;
                    const maxHeight = 2000;

                    if (width > maxWidth) {
                        height = (height * maxWidth) / width;
                        width = maxWidth;
                    }
                    if (height > maxHeight) {
                        width = (width * maxHeight) / height;
                        height = maxHeight;
                    }

                    canvas.width = width;
                    canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);

                    let quality = 0.9;
                    let compressedBlob;

                    const compress = () => {
                        canvas.toBlob((blob) => {
                            if (blob.size > 10 * 1024 * 1024 && quality > 0.1) {
                                quality -= 0.1;
                                compress();
                            } else {
                                const compressedFile = new File([blob], file.name, {
                                    type: file.type,
                                    lastModified: Date.now()
                                });
                                resolve(compressedFile);
                            }
                        }, file.type, quality);
                    };

                    compress();
                };

                img.src = URL.createObjectURL(file);
            });
        }

        async function handleImageFiles(files) {
            for (const file of files) {
                if (selectedFiles.length >= 10) {
                    alert('最多只能上传10张图片');
                    return;
                }

                if (!file.type.startsWith('image/')) {
                    alert('请选择图片文件');
                    return;
                }

                if (file.size > 50 * 1024 * 1024) {
                    alert('图片大小不能超过50MB');
                    return;
                }

                let processedFile = file;
                if (file.size > 10 * 1024 * 1024) {
                    processedFile = await compressImage(file);
                }

                selectedFiles.push(processedFile);
                const reader = new FileReader();
                reader.onload = (e) => {
                    addPreviewImage(e.target.result, false, processedFile);
                };
                reader.readAsDataURL(processedFile);
            }
        }

        function addPreviewImage(src, isExisting = false, file = null) {
            const container = document.getElementById('preview-container');
            const div = document.createElement('div');
            div.className = 'preview-item';

            const img = document.createElement('img');
            img.src = src;
            div.appendChild(img);

            const removeBtn = document.createElement('button');
            removeBtn.className = 'remove-btn';
            removeBtn.innerHTML = '×';
            removeBtn.onclick = () => removePreviewImage(div, isExisting, file);
            div.appendChild(removeBtn);

            container.appendChild(div);
        }

        function removePreviewImage(element, isExisting, file) {
            if (isExisting) {
                const img = element.querySelector('img');
                const src = img.src;
                const postId = document.getElementById('post-id').value;

                if (postId && confirm('确定要删除这张图片吗？')) {
                    const imageIndex = Array.from(document.querySelectorAll('.preview-item img'))
                        .findIndex(img => img.src === src);

                    if (imageIndex !== -1) {
                        fetch(`/api/posts/${postId}/images/${imageIndex}`, {
                            method: 'DELETE'
                        })
                        .then(res => res.json())
                        .then(data => {
                            element.remove();
                        })
                        .catch(err => {
                            alert('删除图片失败');
                            console.error(err);
                        });
                    }
                }
            } else if (file) {
                selectedFiles = selectedFiles.filter(f => f !== file);
                element.remove();
            }
        }

        document.getElementById('post-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const title = document.getElementById('post-title').value;
            const content = document.getElementById('post-content').value;
            const postId = document.getElementById('post-id').value;

            const formData = new FormData();
            formData.append('title', title);
            formData.append('content', content);

            const newFiles = selectedFiles.filter(f => f instanceof File);
            newFiles.forEach(file => {
                formData.append('images', file);
            });

            try {
                const url = postId ? `/api/posts/${postId}` : '/api/posts';
                const method = postId ? 'PUT' : 'POST';

                const response = await fetch(url, {
                    method: method,
                    body: formData
                });

                if (response.ok) {
                    alert(postId ? '日志已更新' : '日志发布成功');
                    closeEditor();
                    loadPosts();
                } else {
                    const error = await response.json();
                    alert(error.error || '操作失败');
                }
            } catch (error) {
                alert('操作失败，请重试');
                console.error('Error submitting post:', error);
            }
        });

        async function viewPost(postId) {
            currentViewPostId = postId;
            try {
                const response = await fetch(`/api/posts/${postId}`);
                const post = await response.json();

                document.getElementById('view-title').textContent = post.title;
                document.getElementById('view-date').textContent = new Date(post.created_at).toLocaleString('zh-CN');
                document.getElementById('view-content').textContent = post.content;

                const imagesContainer = document.getElementById('view-images');
                imagesContainer.innerHTML = '';
                if (post.images && post.images.length > 0) {
                    post.images.forEach(img => {
                        const imgEl = document.createElement('img');
                        imgEl.src = img;
                        imgEl.style.maxWidth = '200px';
                        imgEl.style.marginRight = '10px';
                        imagesContainer.appendChild(imgEl);
                    });
                }

                await loadComments(postId);
                document.getElementById('view-modal').classList.add('active');
            } catch (error) {
                alert('加载日志失败');
                console.error('Error viewing post:', error);
            }
        }

        async function loadComments(postId) {
            try {
                const response = await fetch(`/api/posts/${postId}/comments`);
                const comments = await response.json();
                const commentsList = document.getElementById('comments-list');

                if (comments.length === 0) {
                    commentsList.innerHTML = '<p style="color: #888;">暂无评论，来发表第一条评论吧！</p>';
                    return;
                }

                commentsList.innerHTML = comments.map(comment => `
                    <div style="background: #f5f5f5; padding: 15px; border-radius: 10px; margin-bottom: 10px;">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                            <strong style="color: #667eea;">${escapeHtml(comment.author)}</strong>
                            <span style="color: #888; font-size: 0.85rem;">${new Date(comment.created_at).toLocaleString('zh-CN')}</span>
                        </div>
                        <p style="margin: 0; color: #333;">${escapeHtml(comment.content)}</p>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading comments:', error);
            }
        }

        async function submitComment() {
            const author = document.getElementById('comment-author').value.trim();
            const content = document.getElementById('comment-content').value.trim();

            if (!author || !content) {
                alert('请填写昵称和评论内容');
                return;
            }

            try {
                const response = await fetch(`/api/posts/${currentViewPostId}/comments`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ author, content })
                });

                if (response.ok) {
                    document.getElementById('comment-content').value = '';
                    await loadComments(currentViewPostId);
                } else {
                    const error = await response.json();
                    alert(error.error || '评论失败');
                }
            } catch (error) {
                alert('评论失败，请重试');
                console.error('Error submitting comment:', error);
            }
        }

        function closeViewer() {
            document.getElementById('view-modal').classList.remove('active');
        }

        async function editPost(postId) {
            openEditor(postId);
        }

        async function deletePost(postId) {
            if (!confirm('确定要删除这篇日志吗？此操作不可恢复。')) {
                return;
            }

            try {
                const response = await fetch(`/api/posts/${postId}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    alert('日志已删除');
                    loadPosts();
                } else {
                    const error = await response.json();
                    alert(error.error || '删除失败');
                }
            } catch (error) {
                alert('删除失败，请重试');
                console.error('Error deleting post:', error);
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.classList.remove('active');
                }
            });
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeEditor();
                closeViewer();
            }
        });

        loadPosts();
    </script>
</body>
</html>
