<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>验证 - Zoe's Blog</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('/src/previewFix.jpg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: bgPulse 15s ease-in-out infinite;
        }

        @keyframes bgPulse {
            0%, 100% { background-size: cover; }
            50% { background-size: 105% cover; }
        }

        .verify-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 50px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            animation: slideUp 0.8s ease-out, fadeIn 1s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .verify-container h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2rem;
            animation: fadeInDown 0.6s ease-out 0.3s both;
        }

        .verify-container p {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1rem;
            animation: fadeInDown 0.6s ease-out 0.5s both;
        }

        @keyframes fadeInDown {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .question {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            font-size: 1.3rem;
            animation: fadeInScale 0.6s ease-out 0.7s both;
        }

        @keyframes fadeInScale {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .answer-input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1.1rem;
            margin-bottom: 20px;
            transition: all 0.3s ease;
            animation: fadeInUp 0.6s ease-out 0.9s both;
        }

        .answer-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 15px rgba(102, 126, 234, 0.3);
            transform: scale(1.02);
        }

        @keyframes fadeInUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            animation: fadeInUp 0.6s ease-out 1.1s both;
        }

        .submit-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }

        .submit-btn:active {
            transform: translateY(0) scale(0.98);
        }

        .error {
            color: #ff6b6b;
            margin-top: 15px;
            font-size: 0.95rem;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .hint {
            color: #888;
            font-size: 0.9rem;
            margin-top: 20px;
            animation: fadeInUp 0.6s ease-out 1.3s both;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .shake {
            animation: shake 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="verify-container">
        <h1>Zoe Doo's Blog</h1>
        <p>欢迎来到我的个人博客，请先回答一个问题</p>
        
        <div class="question">
            Zoe Doo是谁？
        </div>
        
        <input type="text" class="answer-input" id="answer" placeholder="请输入你的答案" autocomplete="off">
        
        <button class="submit-btn" onclick="verifyAnswer()">验证</button>
        
        <p class="error" id="error-msg">答案错误，请重新尝试</p>

        <p class="hint">提示：这是一个关于博主身份的问题</p>
    </div>

    <script>
        async function logAccess() {
            try {
                await fetch('/api/log-access', { method: 'POST' });
            } catch (error) {
                console.error('Error logging access:', error);
            }
        }

        async function verifyAnswer() {
            const answer = document.getElementById('answer').value.trim();
            const errorMsg = document.getElementById('error-msg');
            const container = document.querySelector('.verify-container');

            if (answer === 'zoeadmin') {
                try {
                    const response = await fetch('/api/access-logs', {
                        headers: { 'x-admin-key': answer }
                    });

                    if (response.ok) {
                        sessionStorage.setItem('adminKey', answer);
                        window.location.href = '/visitors.html';
                        return;
                    }
                } catch (error) {
                    console.error('Error verifying admin:', error);
                }
            }

            if (answer === '我是杜圳本人') {
                sessionStorage.setItem('verified', 'true');
                sessionStorage.setItem('isOwner', 'true');
                logAccess();
                window.location.href = '/index.html';
            } else if (answer === '杜圳') {
                sessionStorage.setItem('verified', 'true');
                sessionStorage.setItem('isOwner', 'false');
                logAccess();
                window.location.href = '/index.html';
            } else {
                errorMsg.style.display = 'block';
                container.classList.add('shake');
                setTimeout(() => {
                    container.classList.remove('shake');
                }, 300);
            }
        }

        document.getElementById('answer').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                verifyAnswer();
            }
        });

        if (sessionStorage.getItem('verified') === 'true') {
            window.location.href = '/index.html';
        }
    </script>
</body>
</html>
