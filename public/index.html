<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoe's Blog</title>
    <script>
        if (sessionStorage.getItem('verified') !== 'true') {
            window.location.href = '/verify.html';
        }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('/src/previewFix.jpg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 40px 0;
            color: white;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .post-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .post-card:hover {
            transform: translateY(-5px);
        }

        .post-card h3 {
            color: #333;
            margin-bottom: 10px;
            font-size: 1.4rem;
        }

        .post-card .date {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }

        .post-card .preview {
            color: #555;
            line-height: 1.6;
            margin-bottom: 15px;
            max-height: 100px;
            overflow: hidden;
        }

        .post-card .images-preview {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .post-card .images-preview img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
        }

        .post-card .video-indicator {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: #ff6b6b;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.85rem;
            margin-bottom: 10px;
        }

        .post-actions {
            display: flex;
            gap: 10px;
        }

        .post-actions button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .btn-edit {
            background: #667eea;
            color: white;
        }

        .btn-edit:hover {
            background: #5a6fd6;
        }

        .btn-delete {
            background: #ff6b6b;
            color: white;
        }

        .btn-delete:hover {
            background: #ee5a5a;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            overflow-y: auto;
            padding: 20px;
        }

        .modal.active {
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 800px;
            width: 100%;
            margin: 40px auto;
        }

        .modal-content h2 {
            margin-bottom: 30px;
            color: #333;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }

        .form-group input[type="text"],
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        .form-group input[type="text"]:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group textarea {
            min-height: 200px;
            resize: vertical;
            font-family: inherit;
        }

        .upload-area {
            border: 2px dashed #ccc;
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .upload-area:hover {
            border-color: #667eea;
            background: #f8f8ff;
        }

        .upload-area.disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .upload-area input[type="file"] {
            display: none;
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .preview-container {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .preview-item {
            position: relative;
            width: 120px;
            height: 120px;
        }

        .preview-item img,
        .preview-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;
            border: 2px solid #e0e0e0;
        }

        .preview-item .remove-btn {
            position: absolute;
            top: -10px;
            right: -10px;
            width: 25px;
            height: 25px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .preview-item .compress-indicator {
            position: absolute;
            bottom: -5px;
            left: -5px;
            background: #4caf50;
            color: white;
            padding: 2px 5px;
            border-radius: 5px;
            font-size: 0.7rem;
        }

        .modal-actions {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .modal-actions button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-cancel {
            background: #e0e0e0;
            color: #555;
        }

        .btn-cancel:hover {
            background: #d0d0d0;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: white;
        }

        .empty-state .icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .empty-state h3 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: white;
        }

        .comments-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }

        .view-media-container {
            margin-bottom: 20px;
            width: 100%;
            max-width: 100%;
            overflow: hidden;
            box-sizing: border-box;
        }

        .image-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin: 10px 0;
            width: 100%;
            max-width: 100%;
            box-sizing: border-box;
        }

        .image-item {
            position: relative;
            aspect-ratio: 1;
            overflow: hidden;
            border-radius: 6px;
            cursor: pointer;
            box-sizing: border-box;
        }

        .image-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
            box-sizing: border-box;
        }

        .image-item:hover img {
            transform: scale(1.05);
        }

        .view-media-container video {
            max-width: 100%;
            border-radius: 8px;
            margin: 10px 0;
        }

        .view-modal-content {
            box-sizing: border-box;
            overflow: hidden;
        }

        .compress-progress {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .posts-grid {
                grid-template-columns: 1fr;
            }

            .modal-content {
            padding: 25px;
            margin: 20px auto;
        }
    }

    .image-modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.9);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        display: none;
    }

    .image-modal.active {
        display: flex;
    }

    .image-modal-content {
        max-width: 90%;
        max-height: 90%;
    }

    .image-modal-content img {
        max-width: 100%;
        max-height: 80vh;
        border-radius: 10px;
    }

    .close-modal {
        position: absolute;
        top: 20px;
        right: 30px;
        color: white;
        font-size: 40px;
        font-weight: bold;
        cursor: pointer;
        z-index: 1001;
    }

    .close-modal:hover {
        color: #ccc;
    }

    .avatar-container {
        text-align: center;
        margin-bottom: 20px;
    }

    .avatar {
        position: relative;
        width: 120px;
        height: 120px;
        margin: 0 auto;
        cursor: pointer;
        border-radius: 50%;
        overflow: hidden;
        border: 4px solid rgba(255, 255, 255, 0.3);
        transition: all 0.3s ease;
    }

    .avatar:hover {
        transform: scale(1.05);
        border-color: rgba(255, 255, 255, 0.6);
    }

    .avatar:hover .avatar-edit {
        display: flex;
    }

    .avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .avatar-edit {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.6);
        color: white;
        display: none;
        align-items: center;
        justify-content: center;
        font-size: 1rem;
        transition: all 0.3s ease;
    }

    .avatar-modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.7);
        z-index: 1000;
        align-items: center;
        justify-content: center;
    }

    .avatar-modal.active {
        display: flex;
    }

    .avatar-modal-content {
        background: white;
        border-radius: 20px;
        padding: 40px;
        max-width: 500px;
        width: 90%;
        text-align: center;
    }

    .avatar-modal-content h2 {
        margin-bottom: 30px;
        color: #333;
    }

    .avatar-upload-area {
        border: 2px dashed #ccc;
        border-radius: 10px;
        padding: 30px;
        text-align: center;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-bottom: 30px;
    }

    .avatar-upload-area:hover {
        border-color: #667eea;
        background: #f8f8ff;
    }

    .avatar-upload-area input[type="file"] {
        display: none;
    }

    .avatar-upload-icon {
        font-size: 3rem;
        margin-bottom: 10px;
    }

    .current-avatar {
        margin-bottom: 20px;
    }

    .current-avatar img {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        object-fit: cover;
        border: 3px solid #e0e0e0;
    }

    .avatar-actions {
        display: flex;
        gap: 15px;
        justify-content: center;
    }

    .avatar-actions button {
        padding: 12px 30px;
        border: none;
        border-radius: 10px;
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .btn-upload {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
    }

    .btn-upload:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }

    .btn-cancel-avatar {
        background: #e0e0e0;
        color: #555;
    }

    .btn-cancel-avatar:hover {
        background: #d0d0d0;
    }

    .btn-delete-avatar {
        background: #ff6b6b;
        color: white;
    }

    .btn-delete-avatar:hover {
        background: #ee5a5a;
    }
</style>
</head>
<body>
    <div class="container">
        <header>
            <div class="avatar-container">
                <div class="avatar" onclick="openAvatarModal()" id="avatar">
                    <img id="avatar-img" src="" alt="Avatar">
                    <div class="avatar-edit" id="avatar-edit" style="display: none;">编辑</div>
                </div>
            </div>
            <h1>Zoe's Blog</h1>
            <p>zoe乱七八糟的的的的的博客,当然你也可以向我提问,或许我会为你解答。</p>
            <div class="nav">
                <button class="nav-btn" onclick="openEditor()" id="new-post-btn">撰写新日志</button>
                <button class="nav-btn" onclick="openGuestbook()">留言</button>
                <button class="nav-btn" onclick="loadPosts()">刷新列表</button>
                <button class="nav-btn" onclick="openAccessLogs()" id="access-logs-btn" style="display: none;">访问日志</button>
            </div>
        </header>

        <div id="posts-container">
            <div class="loading">加载中...</div>
        </div>
    </div>

    <div class="modal" id="editor-modal">
        <div class="modal-content">
            <h2 id="editor-title">撰写新日志</h2>
            <form id="post-form">
                <input type="hidden" id="post-id">

                <div class="form-group">
                    <label for="post-title">标题</label>
                    <input type="text" id="post-title" placeholder="请输入日志标题" required>
                </div>

                <div class="form-group">
                    <label for="post-content">内容</label>
                    <textarea id="post-content" placeholder="请输入日志内容" required></textarea>
                </div>

                <div class="form-group">
                    <label>图片上传</label>
                    <div class="upload-area" onclick="document.getElementById('image-input').click()" ondragover="event.preventDefault()" ondrop="handleImageDrop(event)">
                        <div class="upload-icon">📷</div>
                        <p>点击或拖拽图片到此处上传</p>
                        <p style="font-size: 0.85rem; color: #888; margin-top: 5px;">支持 JPG、PNG、GIF、WebP 格式，最多10张，单张最大50MB</p>
                        <input type="file" id="image-input" multiple accept="image/*" onchange="handleImageSelect(event)">
                    </div>
                    <div class="preview-container" id="image-preview-container"></div>
                </div>

                <div class="form-group">
                    <label>视频上传</label>
                    <div class="upload-area" id="video-upload-area" onclick="document.getElementById('video-input').click()" ondragover="event.preventDefault()" ondrop="handleVideoDrop(event)">
                        <div class="upload-icon">🎬</div>
                        <p>点击或拖拽视频到此处上传</p>
                        <p style="font-size: 0.85rem; color: #888; margin-top: 5px;">支持 MP4、MOV、AVI 格式，最多5个，单个最大50MB，大于10MB会自动压缩</p>
                        <input type="file" id="video-input" multiple accept="video/*" onchange="handleVideoSelect(event)">
                    </div>
                    <div class="preview-container" id="video-preview-container"></div>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn-cancel" onclick="closeEditor()">取消</button>
                    <button type="submit" class="btn-submit" id="submit-btn">发布</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal" id="view-modal">
        <div class="modal-content view-modal-content">
            <h2 id="view-title"></h2>
            <p id="view-date" style="color: #888; margin-bottom: 20px;"></p>
            <div id="view-content" style="line-height: 1.8; color: #333; margin-bottom: 30px;"></div>
            <div id="view-media" class="view-media-container"></div>

            <div class="comments-section">
                <h3 style="margin-bottom: 15px; color: #333;">评论</h3>
                <div id="comments-list" style="margin-bottom: 20px;"></div>
                <div class="comment-form">
                    <input type="text" id="comment-author" placeholder="你的名字" style="width: 30%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 8px; margin-right: 10px;">
                    <input type="text" id="comment-content" placeholder="写下你的评论..." style="width: 50%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 8px; margin-right: 10px;">
                    <button onclick="submitComment()" style="padding: 10px 20px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer;">发送</button>
                </div>
            </div>

            <div class="modal-actions" style="margin-top: 30px;">
                <button class="btn-cancel" onclick="closeViewer()">关闭</button>
            </div>
        </div>
    </div>

    <div class="modal" id="guestbook-modal">
        <div class="modal-content">
            <h2 id="guestbook-title">留言</h2>
            <form id="guestbook-form">
                <div class="form-group">
                    <label for="guestbook-title-input">标题</label>
                    <input type="text" id="guestbook-title-input" placeholder="请输入留言标题" required>
                </div>

                <div class="form-group">
                    <label for="guestbook-content-input">内容</label>
                    <textarea id="guestbook-content-input" placeholder="请输入留言内容" required></textarea>
                </div>

                <div class="form-group">
                    <label>图片（可选，最多9张）</label>
                    <div class="upload-area" id="guestbook-upload-area" onclick="document.getElementById('guestbook-image-input').click()">
                        <p>点击或拖拽图片到此处上传</p>
                        <input type="file" id="guestbook-image-input" accept="image/*" multiple style="display: none;" onchange="handleGuestbookImageUpload(event)">
                    </div>
                    <div class="image-preview-container" id="guestbook-image-preview-container"></div>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn-cancel" onclick="closeGuestbook()">取消</button>
                    <button type="submit" class="btn-submit" id="guestbook-submit-btn">发布</button>
                </div>
            </form>
        </div>
    </div>

    <div class="image-modal" id="image-modal">
        <span class="close-modal" onclick="closeImageModal()">&times;</span>
        <div class="image-modal-content">
            <img id="modal-image" src="" alt="Large image">
        </div>
    </div>

    <div class="modal" id="access-logs-modal">
        <div class="modal-content">
            <h2>访问日志</h2>
            <div id="access-logs-container" style="margin-bottom: 30px;">
                <div class="loading">加载中...</div>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeAccessLogs()">关闭</button>
            </div>
        </div>
    </div>

    <div class="avatar-modal" id="avatar-modal">
        <div class="avatar-modal-content">
            <h2>修改头像</h2>
            <div class="current-avatar" id="current-avatar">
                <img id="current-avatar-img" src="" alt="Current Avatar">
            </div>
            <div class="avatar-upload-area" onclick="document.getElementById('avatar-input').click()" ondragover="event.preventDefault()" ondrop="handleAvatarDrop(event)">
                <div class="avatar-upload-icon">📷</div>
                <p>点击或拖拽图片到此处上传</p>
                <p style="font-size: 0.85rem; color: #888; margin-top: 5px;">支持 JPG、PNG、GIF、WebP 格式，最大50MB</p>
                <input type="file" id="avatar-input" accept="image/*" onchange="handleAvatarSelect(event)">
            </div>
            <div class="avatar-actions">
                <button class="btn-delete-avatar" onclick="deleteAvatar()">删除头像</button>
                <button class="btn-cancel-avatar" onclick="closeAvatarModal()">取消</button>
                <button class="btn-upload" onclick="uploadAvatar()">上传</button>
            </div>
        </div>
    </div>

    <script>
        const isOwner = sessionStorage.getItem('isOwner') === 'true';
        
        if (!isOwner) {
            document.getElementById('new-post-btn').style.display = 'none';
        } else {
            document.getElementById('access-logs-btn').style.display = 'block';
            document.getElementById('avatar-edit').style.display = 'none';
        }

        let selectedImages = [];
        let selectedVideos = [];
        let editingPostId = null;
        let currentViewPostId = null;
        let ffmpeg = null;
        let ffmpegLoading = false;
        let selectedAvatar = null;

        async function loadFFmpeg() {
            if (ffmpeg || ffmpegLoading) return;

            ffmpegLoading = true;
            try {
                const { FFmpeg } = await import('@ffmpeg/ffmpeg');
                const { fetchFile } = await import('@ffmpeg/util');

                ffmpeg = new FFmpeg();
                await ffmpeg.load({
                    coreURL: 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/esm/ffmpeg-core.js',
                    wasmURL: 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/esm/ffmpeg-core.wasm'
                });

                window.ffmpegFetchFile = fetchFile;
                console.log('FFmpeg loaded successfully');
            } catch (error) {
                console.error('Failed to load FFmpeg:', error);
                alert('视频压缩功能加载失败，将上传原始视频');
            } finally {
                ffmpegLoading = false;
            }
        }

        async function compressVideo(file) {
            const inputName = 'input_' + Date.now() + '_' + file.name;
            const outputName = 'output_' + Date.now() + '.mp4';

            try {
                await ffmpeg.writeFile(inputName, await window.ffmpegFetchFile(file));

                let crf = 28;
                let scale = '-2:720';

                if (file.size > 30 * 1024 * 1024) {
                    scale = '-2:480';
                    crf = 32;
                } else if (file.size > 20 * 1024 * 1024) {
                    scale = '-2:540';
                    crf = 30;
                }

                await ffmpeg.exec([
                    '-i', inputName,
                    '-vf', `scale=${scale}`,
                    '-crf', String(crf),
                    '-c:v', 'libx264',
                    '-preset', 'fast',
                    '-c:a', 'aac',
                    '-b:a', '128k',
                    '-movflags', '+faststart',
                    outputName
                ]);

                const data = await ffmpeg.readFile(outputName);
                const compressedBlob = new Blob([data.buffer], { type: 'video/mp4' });
                const compressedFile = new File([compressedBlob], file.name.replace(/\.[^.]+$/, '.mp4'), {
                    type: 'video/mp4',
                    lastModified: Date.now()
                });

                await ffmpeg.deleteFile(inputName);
                await ffmpeg.deleteFile(outputName);

                return compressedFile;
            } catch (error) {
                console.error('Video compression error:', error);
                return file;
            }
        }

        function compressImage(file) {
            return new Promise((resolve) => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const img = new Image();

                img.onload = () => {
                    let width = img.width;
                    let height = img.height;
                    const maxWidth = 2000;
                    const maxHeight = 2000;

                    if (width > maxWidth) {
                        height = (height * maxWidth) / width;
                        width = maxWidth;
                    }
                    if (height > maxHeight) {
                        width = (width * maxHeight) / height;
                        height = maxHeight;
                    }

                    canvas.width = width;
                    canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);

                    let quality = 0.9;

                    const compress = () => {
                        canvas.toBlob((blob) => {
                            if (blob.size > 10 * 1024 * 1024 && quality > 0.1) {
                                quality -= 0.1;
                                compress();
                            } else {
                                const compressedFile = new File([blob], file.name, {
                                    type: file.type,
                                    lastModified: Date.now()
                                });
                                resolve(compressedFile);
                            }
                        }, file.type, quality);
                    };

                    compress();
                };

                img.src = URL.createObjectURL(file);
            });
        }

        async function handleImageFiles(files) {
            for (const file of files) {
                if (selectedImages.length >= 10) {
                    alert('最多只能上传10张图片');
                    return;
                }

                if (!file.type.startsWith('image/')) {
                    alert('请选择图片文件');
                    return;
                }

                if (file.size > 50 * 1024 * 1024) {
                    alert('图片大小不能超过50MB');
                    return;
                }

                let processedFile = file;
                if (file.size > 10 * 1024 * 1024) {
                    processedFile = await compressImage(file);
                }

                selectedImages.push(processedFile);
                const reader = new FileReader();
                reader.onload = (e) => {
                    addPreviewImage(e.target.result, false, processedFile);
                };
                reader.readAsDataURL(processedFile);
            }
        }

        async function handleVideoFiles(files) {
            const uploadArea = document.getElementById('video-upload-area');

            for (const file of files) {
                if (selectedVideos.length >= 5) {
                    alert('最多只能上传5个视频');
                    return;
                }

                if (!file.type.startsWith('video/')) {
                    alert('请选择视频文件');
                    return;
                }

                if (file.size > 50 * 1024 * 1024) {
                    alert('视频大小不能超过50MB');
                    return;
                }

                let processedFile = file;
                let isCompressed = false;

                if (file.size > 10 * 1024 * 1024) {
                    if (!ffmpeg) {
                        await loadFFmpeg();
                    }

                    if (ffmpeg) {
                        uploadArea.classList.add('disabled');

                        const previewDiv = document.createElement('div');
                        previewDiv.className = 'preview-item';
                        previewDiv.style.position = 'relative';

                        const video = document.createElement('video');
                        video.src = URL.createObjectURL(file);
                        video.controls = true;
                        video.style.width = '100%';
                        video.style.height = '100%';
                        previewDiv.appendChild(video);

                        const progressDiv = document.createElement('div');
                        progressDiv.className = 'compress-progress';
                        progressDiv.textContent = '压缩中...';
                        previewDiv.appendChild(progressDiv);

                        document.getElementById('video-preview-container').appendChild(previewDiv);

                        try {
                            processedFile = await compressVideo(file);
                            isCompressed = processedFile.size < file.size;

                            document.getElementById('video-preview-container').removeChild(previewDiv);
                        } catch (error) {
                            console.error('Compression failed:', error);
                            document.getElementById('video-preview-container').removeChild(previewDiv);
                        }

                        uploadArea.classList.remove('disabled');
                    } else {
                        alert('视频压缩功能不可用，将尝试上传原始文件');
                    }
                }

                selectedVideos.push(processedFile);
                const reader = new FileReader();
                reader.onload = (e) => {
                    addPreviewVideo(e.target.result, false, processedFile, isCompressed);
                };
                reader.readAsDataURL(processedFile);
            }
        }

        function removePreviewImage(element, isExisting, file) {
            if (isExisting) {
                const img = element.querySelector('img');
                const src = img.src;
                const postId = document.getElementById('post-id').value;

                if (postId && confirm('确定要删除这张图片吗？')) {
                    const imageIndex = Array.from(document.querySelectorAll('#image-preview-container .preview-item img'))
                        .findIndex(img => img.src === src);

                    if (imageIndex !== -1) {
                        fetch(`/api/posts/${postId}/images/${imageIndex}`, {
                            method: 'DELETE'
                        })
                        .then(res => res.json())
                        .then(data => {
                            element.remove();
                        })
                        .catch(err => {
                            alert('删除图片失败');
                            console.error(err);
                        });
                    }
                }
            } else if (file) {
                selectedImages = selectedImages.filter(f => f !== file);
                element.remove();
            }
        }

                                    <th style="padding: 12px; text-align: left; border-bottom: 2px solid #e0e0e0;">用户代理</th>
                                    <th style="padding: 12px; text-align: left; border-bottom: 2px solid #e0e0e0;">访问时间</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${logs.map(log => `
                                    <tr style="border-bottom: 1px solid #e0e0e0;">
                                        <td style="padding: 12px;">${log.id}</td>
                                        <td style="padding: 12px;">${escapeHtml(log.ip_address)}</td>
                                        <td style="padding: 12px; max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${escapeHtml(log.user_agent || '-')}</td>
                                        <td style="padding: 12px;">${new Date(log.accessed_at).toLocaleString('zh-CN')}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                `;
            } catch (error) {
                container.innerHTML = '<p style="text-align: center; color: #ff6b6b;">加载日志失败，请刷新重试</p>';
                console.error('Error loading access logs:', error);
            }
        }

        async function editPost(postId) {
            openEditor(postId);
        }

        async function deletePost(postId) {
            if (!confirm('确定要删除这条日志吗？')) {
                return;
            }

            try {
                const response = await fetch(`/api/posts/${postId}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    alert('日志已删除');
                    loadPosts();
                } else {
                    const error = await response.json();
                    alert(error.error || '删除失败');
                }
            } catch (error) {
                alert('删除失败，请重试');
                console.error('Error deleting post:', error);
            }
        }

        async function editGuestbookEntry(entryId) {
            try {
                const response = await fetch(`/api/guestbook/${entryId}`);
                const entry = await response.json();

                document.getElementById('post-id').value = entry.id;
                document.getElementById('post-title').value = entry.title;
                document.getElementById('post-content').value = entry.content;

                selectedImages = [];
                selectedVideos = [];
                const imagePreviewContainer = document.getElementById('image-preview-container');
                const videoPreviewContainer = document.getElementById('video-preview-container');
                imagePreviewContainer.innerHTML = '';
                videoPreviewContainer.innerHTML = '';

                if (entry.images && entry.images.length > 0) {
                    entry.images.forEach((img) => {
                        addPreviewImage(img, true);
                    });
                }

                if (entry.videos && entry.videos.length > 0) {
                    entry.videos.forEach((video) => {
                        addPreviewVideo(video, true);
                    });
                }

                const modal = document.getElementById('editor-modal');
                const title = document.getElementById('editor-title');
                const submitBtn = document.getElementById('submit-btn');
                title.textContent = '编辑留言';
                submitBtn.textContent = '保存修改';
                modal.classList.add('active');
                loadFFmpeg();
            } catch (error) {
                alert('加载留言失败');
                console.error('Error loading guestbook entry:', error);
            }
        }

        function openAvatarModal() {
            if (!isOwner) return;
            
            const modal = document.getElementById('avatar-modal');
            modal.classList.add('active');
        }

        function closeAvatarModal() {
            const modal = document.getElementById('avatar-modal');
            modal.classList.remove('active');
            selectedAvatar = null;
            document.getElementById('avatar-input').value = '';
            loadAvatar();
        }

        function handleAvatarDrop(event) {
            event.preventDefault();
            const files = Array.from(event.dataTransfer.files);
            if (files.length > 0) {
                handleAvatarFile(files[0]);
            }
        }

        function handleAvatarSelect(event) {
            const files = Array.from(event.target.files);
            if (files.length > 0) {
                handleAvatarFile(files[0]);
            }
            event.target.value = '';
        }

        function handleAvatarFile(file) {
            if (!file.type.startsWith('image/')) {
                alert('请选择图片文件');
                return;
            }

            if (file.size > 50 * 1024 * 1024) {
                alert('图片大小不能超过50MB');
                return;
            }

            selectedAvatar = file;
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('current-avatar-img').src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        async function uploadAvatar() {
            if (!selectedAvatar) {
                alert('请选择要上传的头像');
                return;
            }

            const formData = new FormData();
            formData.append('avatar', selectedAvatar);

            try {
                const response = await fetch('/api/avatar', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('avatar-img').src = data.url;
                    closeAvatarModal();
                    alert('头像上传成功');
                } else {
                    const error = await response.json();
                    alert(error.error || '上传失败');
                }
            } catch (error) {
                alert('上传失败，请重试');
                console.error('Error uploading avatar:', error);
            }
        }
