<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>验证 - Zoe's Blog</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .verify-container {
            background: white;
            border-radius: 20px;
            padding: 50px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .verify-container h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2rem;
        }

        .verify-container p {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .question {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            font-size: 1.3rem;
        }

        .answer-input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1.1rem;
            margin-bottom: 20px;
            transition: border-color 0.3s ease;
        }

        .answer-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .error {
            color: #ff6b6b;
            margin-top: 15px;
            font-size: 0.95rem;
            display: none;
        }

        .hint {
            color: #888;
            font-size: 0.9rem;
            margin-top: 20px;
        }

        .admin-link {
            color: #888;
            font-size: 0.85rem;
            margin-top: 30px;
            cursor: pointer;
            text-decoration: underline;
        }

        .admin-link:hover {
            color: #667eea;
        }

        .admin-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .admin-modal.active {
            display: flex;
        }

        .admin-modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .admin-modal-content h3 {
            margin-bottom: 20px;
            color: #333;
        }

        .admin-modal-content input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            margin-bottom: 15px;
        }

        .admin-modal-content input:focus {
            outline: none;
            border-color: #667eea;
        }

        .admin-modal-btns {
            display: flex;
            gap: 10px;
        }

        .admin-modal-btns button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
        }

        .admin-modal-btns .cancel-btn {
            background: #e0e0e0;
            color: #333;
        }

        .admin-modal-btns .submit-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .shake {
            animation: shake 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="verify-container">
        <h1>Zoe's Blog</h1>
        <p>欢迎来到我的个人博客，请先回答一个问题</p>
        
        <div class="question">
            zoe是谁？
        </div>
        
        <input type="text" class="answer-input" id="answer" placeholder="请输入你的答案" autocomplete="off">
        
        <button class="submit-btn" onclick="verifyAnswer()">验证</button>
        
        <p class="error" id="error-msg">答案错误，请重新尝试</p>

        <p class="hint">提示：这是一个关于博主身份的问题</p>

        <p class="admin-link" onclick="openAdminModal()">管理员入口</p>
    </div>

    <div class="admin-modal" id="adminModal">
        <div class="admin-modal-content">
            <h3>管理员登录</h3>
            <input type="password" id="adminPassword" placeholder="请输入管理员密钥">
            <div class="admin-modal-btns">
                <button class="cancel-btn" onclick="closeAdminModal()">取消</button>
                <button class="submit-btn" onclick="verifyAdminPassword()">确定</button>
            </div>
            <p class="error" id="admin-error-msg" style="color: #ff6b6b; margin-top: 15px; font-size: 0.9rem; display: none;"></p>
        </div>
    </div>
</div>

    <script>
        async function logAccess() {
            try {
                await fetch('/api/log-access', { method: 'POST' });
            } catch (error) {
                console.error('Error logging access:', error);
            }
        }

        function verifyAnswer() {
            const answer = document.getElementById('answer').value.trim();
            const errorMsg = document.getElementById('error-msg');
            const container = document.querySelector('.verify-container');

            if (answer === '我是杜圳本人') {
                sessionStorage.setItem('verified', 'true');
                sessionStorage.setItem('isOwner', 'true');
                logAccess();
                window.location.href = '/index.html';
            } else if (answer === '杜圳') {
                sessionStorage.setItem('verified', 'true');
                sessionStorage.setItem('isOwner', 'false');
                logAccess();
                window.location.href = '/index.html';
            } else {
                errorMsg.style.display = 'block';
                container.classList.add('shake');
                setTimeout(() => {
                    container.classList.remove('shake');
                }, 300);
            }
        }

        document.getElementById('answer').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                verifyAnswer();
            }
        });

        if (sessionStorage.getItem('verified') === 'true') {
            window.location.href = '/index.html';
        }

        function openAdminModal() {
            document.getElementById('adminModal').classList.add('active');
            document.getElementById('adminPassword').value = '';
            document.getElementById('admin-error-msg').style.display = 'none';
        }

        function closeAdminModal() {
            document.getElementById('adminModal').classList.remove('active');
        }

        async function verifyAdminPassword() {
            const password = document.getElementById('adminPassword').value.trim();
            const errorMsg = document.getElementById('admin-error-msg');

            if (!password) {
                errorMsg.textContent = '请输入密钥';
                errorMsg.style.display = 'block';
                return;
            }

            try {
                const response = await fetch('/api/access-logs', {
                    headers: { 'x-admin-key': password }
                });

                if (response.status === 403) {
                    errorMsg.textContent = '密钥错误';
                    errorMsg.style.display = 'block';
                    return;
                }

                if (response.ok) {
                    sessionStorage.setItem('adminKey', password);
                    closeAdminModal();
                    window.location.href = '/visitors.html';
                }
            } catch (error) {
                errorMsg.textContent = '验证失败，请重试';
                errorMsg.style.display = 'block';
            }
        }

        document.getElementById('adminPassword').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                verifyAdminPassword();
            }
        });

        document.getElementById('adminModal').addEventListener('click', (e) => {
            if (e.target.id === 'adminModal') {
                closeAdminModal();
            }
        });
    </script>
</body>
</html>
